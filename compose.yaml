# Docker Compose for local Flutter development and CI-like checks in mobile/.
#
# Uses the same Cirrus Labs Flutter image as the CI build so local results
# match what runs on GitHub Actions.
#
# Typical commands:
#   docker compose run --rm flutter flutter analyze
#   docker compose run --rm flutter flutter test
#   docker compose run --rm flutter flutter build apk --release
#   docker compose run --rm build-apk
#
# The first run downloads dependencies; subsequent runs reuse the pub-cache
# and Gradle caches stored in Docker volumes.

services:
  flutter:
    image: ghcr.io/cirruslabs/flutter:stable
    working_dir: /project
    volumes:
      - .:/project
      - flutter-pub-cache:/root/.pub-cache
      - gradle-cache:/root/.gradle
    environment:
      - PUB_CACHE=/root/.pub-cache
    command: ["flutter", "analyze"]

  build-apk:
    image: ghcr.io/cirruslabs/flutter:stable
    working_dir: /project
    volumes:
      - .:/project
      - flutter-pub-cache:/root/.pub-cache
      - gradle-cache:/root/.gradle
    environment:
      - PUB_CACHE=/root/.pub-cache
    command:
      - /bin/sh
      - -c
      - |
        set -e
        flutter pub get
        flutter build apk --release
        mkdir -p dist
        cp build/app/outputs/flutter-apk/app-release.apk dist/notees.apk

volumes:
  flutter-pub-cache:
  gradle-cache:
