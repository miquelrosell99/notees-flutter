name: notees
description: First-class mobile app for Notees — your self-hosted notes, journals, and tasks.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Fleet design system
  cupertino_icons: ^1.0.8
  dynamic_color: ^1.7.0

  # State & navigation
  provider: ^6.1.4
  go_router: ^14.6.0
  shared_preferences: ^2.5.3

  # Networking & security
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # Local data
  sqflite_sqlcipher: ^3.4.0
  path: ^1.9.0
  path_provider: ^2.1.5

  # Encryption & crypto
  cryptography: ^2.8.1
  cryptography_flutter: ^2.3.4

  # Platform integration
  local_auth: ^2.3.0
  connectivity_plus: ^6.1.0
  share_plus: ^10.1.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.0
  image_picker: ^1.1.2
  record: ^6.0.0
  sensors_plus: ^7.0.0
  workmanager: ^0.9.0

  # WebView for advanced React views
  webview_flutter: ^4.12.0

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
